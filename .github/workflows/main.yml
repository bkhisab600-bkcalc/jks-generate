name: Show SHA From Existing Keystore

on:
  workflow_dispatch:

jobs:
  show-sha:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        shell: bash
        run: |
          printf '%s' "${{ secrets.BKCALC_KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks
          ls -lh my-release-key.jks

      - name: Show SHA fingerprints
        run: |
          keytool -list -v \
            -keystore my-release-key.jks \
            -alias "${{ secrets.BKCALC_KEY_ALIAS }}" \
            -storepass "${{ secrets.BKCALC_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.BKCALC_KEY_PASSWORD }}"
